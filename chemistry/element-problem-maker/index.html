<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원소 문항 제작기</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#eef3f8;color:#111}
header{background:#1f2937;color:#fff;text-align:center;padding:12px;font-weight:800;font-size:17px}
.home{display:inline-block;margin-top:6px;color:white;font-size:13px;text-decoration:none;opacity:.85}
.container{max-width:1280px;margin:0 auto;padding:10px}
.card{background:white;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
label{font-size:12px;font-weight:800;color:#333}
input,select,button{width:100%;min-height:34px;padding:6px;font-size:14px;border-radius:8px;border:1px solid #cfd4dc}
button{border:none;background:#2563eb;color:white;font-weight:800;cursor:pointer}
button.secondary{background:#4b5563}
button.dark{background:#111827}
button.warn{background:#dc2626}
.small{font-size:12px;color:#555;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border:1px solid #ddd;padding:5px;text-align:center}
th{background:#f3f4f6}
.ptable{display:grid;grid-template-columns:repeat(18,1fr);gap:4px}
.el{min-height:70px;border:1px solid #ccc;border-radius:8px;padding:5px;background:#fff;cursor:pointer}
.el:hover{outline:3px solid #93c5fd}
.el.on{outline:3px solid #2563eb;background:#eff6ff}
.sym{font-size:20px;font-weight:900}
.num{font-size:11px;color:#555}
.name{font-size:11px;color:#333}
.metal{background:#fef3c7}
.nonmetal{background:#dcfce7}
.noble{background:#e0f2fe}
.metalloid{background:#ede9fe}
.empty{visibility:hidden}
pre{white-space:pre-wrap;background:#f8fafc;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:13px;line-height:1.6}
@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .ptable{grid-template-columns:repeat(9,1fr)}
}
</style>
</head>

<body>

<header>
  ⚗️ 원소 문항 제작기<br>
  <a class="home" href="../../index.html">← J&B LAB 홈으로</a>
</header>

<div class="container">

  <div class="card grid">
    <div>
      <label>원자번호 범위 시작</label>
      <input id="zStart" type="number" value="1">
    </div>

    <div>
      <label>원자번호 범위 끝</label>
      <input id="zEnd" type="number" value="20">
    </div>

    <div>
      <label>비례값 기준 a</label>
      <input id="aValue" type="number" value="1">
    </div>

    <div>
      <label>표시 기준</label>
      <select id="scaleMode">
        <option value="real" selected>실제값</option>
        <option value="relative">a 비례값</option>
      </select>
    </div>

    <div>
      <label>문항용 원소 수</label>
      <select id="pickCount">
        <option value="3" selected>X, Y, Z</option>
        <option value="4">W, X, Y, Z</option>
      </select>
    </div>

    <div>
      <label>선택 조건</label>
      <select id="pickFilter">
        <option value="all">전체</option>
        <option value="main">금속 제외 비금속 중심</option>
        <option value="7to17" selected>7~17번</option>
        <option value="period2">2주기</option>
        <option value="period3">3주기</option>
      </select>
    </div>

    <div>
      <label>정렬</label>
      <select id="sortMode">
        <option value="number">원자번호순</option>
        <option value="valence">원자가 전자 수순</option>
        <option value="shell">전자껍질 수순</option>
        <option value="proton">양성자 수순</option>
      </select>
    </div>

    <div>
      <label>보기</label>
      <select id="viewMode">
        <option value="all">전체 원소</option>
        <option value="selected">선택 원소만</option>
      </select>
    </div>

    <div>
      <label>A값</label>
      <select id="aProp">
        <option value="val" selected>원자가 전자 수(족)</option>
        <option value="shell">전자가 들어있는 전자 껍질 수(주기)</option>
        <option value="proton">양성자 수</option>
        <option value="neutron">중성자 수</option>
        <option value="electron">전자 수</option>
        <option value="stableChange">안정한 이온이 되는 데 잃거나 얻어야 하는 전자 수</option>
      </select>
    </div>

    <div>
      <label>B값</label>
      <select id="bProp">
        <option value="shell" selected>전자가 들어있는 전자 껍질 수(주기)</option>
        <option value="val">원자가 전자 수(족)</option>
        <option value="proton">양성자 수</option>
        <option value="neutron">중성자 수</option>
        <option value="electron">전자 수</option>
        <option value="stableChange">안정한 이온이 되는 데 잃거나 얻어야 하는 전자 수</option>
      </select>
    </div>
  </div>

  <div class="card grid">
    <button onclick="makeRandom()">랜덤 X, Y, Z 생성</button>
    <button class="secondary" onclick="clearSelected()">선택 초기화</button>
    <button class="dark" onclick="copyProblemText()">문항 조건 복사</button>
    <button class="warn" onclick="resetAll()">전체 초기화</button>
  </div>

  <div class="card">
    <div class="small">
      원소를 클릭하면 선택됩니다. 선택된 원소를 기준으로 A값/B값 문항 제작용 표가 자동 생성됩니다.
    </div>
  </div>

  <div class="card">
    <h3>1~20번 주기율표</h3>
    <div id="ptable" class="ptable"></div>
  </div>

  <div class="card">
    <h3>문항 제작용 표</h3>
    <table>
      <thead id="problemHead"></thead>
      <tbody id="problemBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>전체 데이터 표</h3>
    <table>
      <thead>
        <tr>
          <th>원자번호</th>
          <th>원소</th>
          <th>이름</th>
          <th>주기</th>
          <th>족</th>
          <th>전자 배치</th>
          <th>원자가 전자 수</th>
          <th>전자껍질 수</th>
          <th>양성자 수</th>
          <th>중성자 수</th>
          <th>전자 수</th>
          <th>안정 이온 전자 변화</th>
          <th>안정 이온</th>
          <th>분류</th>
        </tr>
      </thead>
      <tbody id="dataTable"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>문항 조건 초안</h3>
    <pre id="problemText"></pre>
  </div>

</div>

<script>
const elements = [
  {z:1,s:"H",name:"수소",period:1,group:1,conf:"1",val:1,shell:1,mass:1,stableChange:"1개 잃거나 1개 얻음",ion:"+1 또는 -1",type:"nonmetal"},
  {z:2,s:"He",name:"헬륨",period:1,group:18,conf:"2",val:2,shell:1,mass:4,stableChange:"0개",ion:"안정",type:"noble"},
  {z:3,s:"Li",name:"리튬",period:2,group:1,conf:"2, 1",val:1,shell:2,mass:7,stableChange:"1개 잃음",ion:"+1",type:"metal"},
  {z:4,s:"Be",name:"베릴륨",period:2,group:2,conf:"2, 2",val:2,shell:2,mass:9,stableChange:"2개 잃음",ion:"+2",type:"metal"},
  {z:5,s:"B",name:"붕소",period:2,group:13,conf:"2, 3",val:3,shell:2,mass:11,stableChange:"3개 잃음",ion:"+3 경향",type:"metalloid"},
  {z:6,s:"C",name:"탄소",period:2,group:14,conf:"2, 4",val:4,shell:2,mass:12,stableChange:"4개 얻거나 공유",ion:"공유 결합",type:"nonmetal"},
  {z:7,s:"N",name:"질소",period:2,group:15,conf:"2, 5",val:5,shell:2,mass:14,stableChange:"3개 얻음",ion:"-3",type:"nonmetal"},
  {z:8,s:"O",name:"산소",period:2,group:16,conf:"2, 6",val:6,shell:2,mass:16,stableChange:"2개 얻음",ion:"-2",type:"nonmetal"},
  {z:9,s:"F",name:"플루오린",period:2,group:17,conf:"2, 7",val:7,shell:2,mass:19,stableChange:"1개 얻음",ion:"-1",type:"nonmetal"},
  {z:10,s:"Ne",name:"네온",period:2,group:18,conf:"2, 8",val:8,shell:2,mass:20,stableChange:"0개",ion:"안정",type:"noble"},
  {z:11,s:"Na",name:"나트륨",period:3,group:1,conf:"2, 8, 1",val:1,shell:3,mass:23,stableChange:"1개 잃음",ion:"+1",type:"metal"},
  {z:12,s:"Mg",name:"마그네슘",period:3,group:2,conf:"2, 8, 2",val:2,shell:3,mass:24,stableChange:"2개 잃음",ion:"+2",type:"metal"},
  {z:13,s:"Al",name:"알루미늄",period:3,group:13,conf:"2, 8, 3",val:3,shell:3,mass:27,stableChange:"3개 잃음",ion:"+3",type:"metal"},
  {z:14,s:"Si",name:"규소",period:3,group:14,conf:"2, 8, 4",val:4,shell:3,mass:28,stableChange:"4개 얻거나 공유",ion:"공유 결합",type:"metalloid"},
  {z:15,s:"P",name:"인",period:3,group:15,conf:"2, 8, 5",val:5,shell:3,mass:31,stableChange:"3개 얻음",ion:"-3",type:"nonmetal"},
  {z:16,s:"S",name:"황",period:3,group:16,conf:"2, 8, 6",val:6,shell:3,mass:32,stableChange:"2개 얻음",ion:"-2",type:"nonmetal"},
  {z:17,s:"Cl",name:"염소",period:3,group:17,conf:"2, 8, 7",val:7,shell:3,mass:35,stableChange:"1개 얻음",ion:"-1",type:"nonmetal"},
  {z:18,s:"Ar",name:"아르곤",period:3,group:18,conf:"2, 8, 8",val:8,shell:3,mass:40,stableChange:"0개",ion:"안정",type:"noble"},
  {z:19,s:"K",name:"칼륨",period:4,group:1,conf:"2, 8, 8, 1",val:1,shell:4,mass:39,stableChange:"1개 잃음",ion:"+1",type:"metal"},
  {z:20,s:"Ca",name:"칼슘",period:4,group:2,conf:"2, 8, 8, 2",val:2,shell:4,mass:40,stableChange:"2개 잃음",ion:"+2",type:"metal"}
];

let selected = [];

const positions = {
  1:[1,1],2:[1,18],
  3:[2,1],4:[2,2],5:[2,13],6:[2,14],7:[2,15],8:[2,16],9:[2,17],10:[2,18],
  11:[3,1],12:[3,2],13:[3,13],14:[3,14],15:[3,15],16:[3,16],17:[3,17],18:[3,18],
  19:[4,1],20:[4,2]
};

function id(x){return document.getElementById(x)}
function val(x){return id(x).value}

function neutron(e){return e.mass - e.z}
function proton(e){return e.z}
function electron(e){return e.z}

function propName(p){
  const names = {
    val:"원자가 전자 수(족)",
    shell:"전자가 들어있는 전자 껍질 수(주기)",
    proton:"양성자 수",
    neutron:"중성자 수",
    electron:"전자 수",
    stableChange:"안정한 이온이 되는 데 잃거나 얻어야 하는 전자 수"
  };
  return names[p];
}

function rawProp(e,p){
  if(p==="val") return e.val;
  if(p==="shell") return e.shell;
  if(p==="proton") return proton(e);
  if(p==="neutron") return neutron(e);
  if(p==="electron") return electron(e);
  if(p==="stableChange") return e.stableChange;
  return "";
}

function formatValue(x){
  if(typeof x === "string") return x;
  if(val("scaleMode") === "real") return String(x);
  const a = Number(val("aValue")) || 1;
  const k = x / a;
  if(k === 1) return "a";
  return `${k}a`;
}

function buildPeriodicTable(){
  const box = id("ptable");
  box.innerHTML = "";

  for(let r=1;r<=4;r++){
    for(let c=1;c<=18;c++){
      const el = elements.find(e => positions[e.z]?.[0]===r && positions[e.z]?.[1]===c);
      const div = document.createElement("div");

      if(!el){
        div.className = "empty";
        box.appendChild(div);
        continue;
      }

      div.className = `el ${el.type}`;
      if(selected.includes(el.z)) div.classList.add("on");

      div.innerHTML = `
        <div class="num">${el.z}</div>
        <div class="sym">${el.s}</div>
        <div class="name">${el.name}</div>
        <div class="num">${el.conf}</div>
      `;

      div.onclick = () => toggleElement(el.z);
      box.appendChild(div);
    }
  }
}

function toggleElement(z){
  if(selected.includes(z)){
    selected = selected.filter(x => x !== z);
  }else{
    selected.push(z);
  }
  updateAll();
}

function getFilteredElements(){
  const start = Number(val("zStart"));
  const end = Number(val("zEnd"));
  const filter = val("pickFilter");

  return elements.filter(e => {
    if(e.z < start || e.z > end) return false;
    if(filter === "7to17") return e.z >= 7 && e.z <= 17;
    if(filter === "period2") return e.period === 2;
    if(filter === "period3") return e.period === 3;
    if(filter === "main") return e.type !== "metal";
    return true;
  });
}

function visibleElements(){
  let arr = val("viewMode") === "selected"
    ? elements.filter(e => selected.includes(e.z))
    : getFilteredElements();

  arr = [...arr];

  const sort = val("sortMode");

  if(sort === "number") arr.sort((a,b)=>a.z-b.z);
  if(sort === "valence") arr.sort((a,b)=>a.val-b.val || a.z-b.z);
  if(sort === "shell") arr.sort((a,b)=>a.shell-b.shell || a.z-b.z);
  if(sort === "proton") arr.sort((a,b)=>a.z-b.z);

  return arr;
}

function getProblemElements(){
  const arr = selected.length
    ? elements.filter(e => selected.includes(e.z))
    : getFilteredElements().slice(0, Number(val("pickCount")));

  return arr.slice(0,5);
}

function renderProblemTable(){
  const arr = getProblemElements();
  const labels = ["X","Y","Z","W","V"];
  const aProp = val("aProp");
  const bProp = val("bProp");

  const labeled = arr.map((e,i)=>({label:labels[i], ...e}));

  id("problemHead").innerHTML = `
    <tr>
      <th>원소</th>
      ${labeled.map(e=>`<th>${e.label}</th>`).join("")}
    </tr>
  `;

  id("problemBody").innerHTML = `
    <tr>
      <th>A<br><span style="font-size:11px;font-weight:500">${propName(aProp)}</span></th>
      ${labeled.map(e=>`<td>${formatValue(rawProp(e,aProp))}</td>`).join("")}
    </tr>
    <tr>
      <th>B<br><span style="font-size:11px;font-weight:500">${propName(bProp)}</span></th>
      ${labeled.map(e=>`<td>${formatValue(rawProp(e,bProp))}</td>`).join("")}
    </tr>
  `;
}

function renderDataTable(){
  const tbody = id("dataTable");
  tbody.innerHTML = "";

  visibleElements().forEach(e => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${e.z}</td>
      <td>${e.s}</td>
      <td>${e.name}</td>
      <td>${e.period}</td>
      <td>${e.group}</td>
      <td>${e.conf}</td>
      <td>${e.val}</td>
      <td>${e.shell}</td>
      <td>${proton(e)}</td>
      <td>${neutron(e)}</td>
      <td>${electron(e)}</td>
      <td>${e.stableChange}</td>
      <td>${e.ion}</td>
      <td>${typeName(e.type)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function typeName(t){
  if(t==="metal") return "금속";
  if(t==="nonmetal") return "비금속";
  if(t==="noble") return "비활성 기체";
  if(t==="metalloid") return "준금속";
  return "";
}

function makeRandom(){
  const count = Number(val("pickCount"));
  const pool = getFilteredElements();
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  selected = shuffled.slice(0,count).map(e=>e.z).sort((a,b)=>a-b);
  updateAll();
}

function clearSelected(){
  selected = [];
  updateAll();
}

function resetAll(){
  id("zStart").value = 1;
  id("zEnd").value = 20;
  id("aValue").value = 1;
  id("scaleMode").value = "real";
  id("pickCount").value = 3;
  id("pickFilter").value = "7to17";
  id("sortMode").value = "number";
  id("viewMode").value = "all";
  id("aProp").value = "val";
  id("bProp").value = "shell";
  selected = [];
  updateAll();
}

function renderProblemText(){
  const arr = getProblemElements();
  const labels = ["X","Y","Z","W","V"];
  const aProp = val("aProp");
  const bProp = val("bProp");

  const lines = arr.map((e,i)=>
`${labels[i]}: ${e.s}(${e.name}) / A=${formatValue(rawProp(e,aProp))} / B=${formatValue(rawProp(e,bProp))} / 원자번호 ${e.z} / 전자 배치 ${e.conf}`
  );

  id("problemText").textContent =
`[문항 조건 초안]

X, Y, Z는 원자번호 ${val("zStart")}~${val("zEnd")} 중 하나인 임의의 원소 기호이다.

A: ${propName(aProp)}
B: ${propName(bProp)}

문항 제작용 표
${lines.join("\n")}

출제 포인트
- 같은 주기이면 전자가 들어 있는 전자껍질 수가 같다.
- 같은 족의 원소는 원자가 전자 수가 같다.
- 원자는 전기적으로 중성이므로 양성자 수와 전자 수가 같다.
- 중성자 수 = 질량수 - 양성자 수이다.
- 1족 금속은 전자 1개를 잃고 +1 이온이 되기 쉽다.
- 2족 금속은 전자 2개를 잃고 +2 이온이 되기 쉽다.
- 16족 비금속은 전자 2개를 얻고 -2 이온이 되기 쉽다.
- 17족 비금속은 전자 1개를 얻고 -1 이온이 되기 쉽다.
- 비활성 기체는 이미 안정한 전자 배치를 가진다.`;
}

function copyProblemText(){
  navigator.clipboard.writeText(id("problemText").textContent);
  alert("문항 조건 초안을 복사했습니다.");
}

function updateAll(){
  buildPeriodicTable();
  renderProblemTable();
  renderDataTable();
  renderProblemText();
}

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", updateAll);
  el.addEventListener("change", updateAll);
});

window.onload = updateAll;
</script>

</body>
<script type="module" src="../license.js"></script>
</html>
