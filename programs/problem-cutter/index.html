<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>문제 추출기 | J&B LAB</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">
  <section class="panel">
    <div class="badge">J&B LAB</div>

    <h1>문제 추출기</h1>

    <p>
      PDF를 업로드하면 페이지를 이미지로 변환한 뒤,<br>
      좌우 2단 구조 기준으로 문항 이미지를 잘라 ZIP으로 저장합니다.
    </p>

    <input id="pdfInput" type="file" accept="application/pdf" multiple>

    <div class="options">
      <label>
        시작 문항
        <input id="startNum" type="number" value="1" min="1">
      </label>

      <label>
        끝 문항
        <input id="endNum" type="number" value="25" min="1">
      </label>

      <label>
        렌더 배율
        <input id="scaleInput" type="number" value="2.5" step="0.5" min="1">
      </label>
    </div>

    <button id="runBtn">문항 추출하기</button>

    <div id="status">대기 중</div>

    <a class="back" href="../../index.html">← J&B LAB으로 돌아가기</a>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>

</body>
<script type="module" src="../license.js"></script>
</html>
